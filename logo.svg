<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#0b0b1a"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#FF007F"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#bg)"/>

  <!-- Outer ring glow -->
  <circle cx="60" cy="60" r="42" stroke="#00E5FF" stroke-width="0.5" opacity="0.15" filter="url(#glowStrong)"/>
  <circle cx="60" cy="60" r="42" stroke="url(#ring1)" stroke-width="3" opacity="0.9" filter="url(#glow)"/>

  <!-- Inner ring -->
  <circle cx="60" cy="60" r="30" stroke="url(#ring2)" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>

  <!-- Core glow -->
  <circle cx="60" cy="60" r="14" fill="#00E5FF" opacity="0.06"/>
  <circle cx="60" cy="60" r="6" fill="#00E5FF" opacity="0.15"/>
  <circle cx="60" cy="60" r="2.5" fill="#FFD700" opacity="0.9"/>

  <!-- Orbiting nodes -->
  <g filter="url(#glow)">
    <circle cx="60" cy="18" r="3.5" fill="#FF007F" opacity="0.9"/>
    <circle cx="98" cy="50" r="3" fill="#00E5FF" opacity="0.85"/>
    <circle cx="85" cy="90" r="3" fill="#7C3AED" opacity="0.8"/>
    <circle cx="30" cy="84" r="2.5" fill="#22c55e" opacity="0.8"/>
    <circle cx="25" cy="38" r="2.5" fill="#FFD700" opacity="0.75"/>
  </g>

  <!-- Energy arcs under heavy load -->
  <g opacity="0.5" filter="url(#glow)">
    <line x1="60" y1="18" x2="98" y2="50" stroke="#FF007F" stroke-width="1" stroke-dasharray="3 4"/>
    <line x1="98" y1="50" x2="85" y2="90" stroke="#00E5FF" stroke-width="0.8" stroke-dasharray="2 5"/>
    <line x1="85" y1="90" x2="30" y2="84" stroke="#7C3AED" stroke-width="0.8" stroke-dasharray="2 4"/>
    <line x1="30" y1="84" x2="25" y2="38" stroke="#FFD700" stroke-width="0.7" stroke-dasharray="2 5"/>
    <line x1="25" y1="38" x2="60" y2="18" stroke="#22c55e" stroke-width="0.7" stroke-dasharray="2 4"/>
  </g>

  <!-- Shockwave pulse rings -->
  <circle cx="60" cy="60" r="50" stroke="#FF007F" stroke-width="0.5" opacity="0.15" filter="url(#glow)"/>
  <circle cx="60" cy="60" r="20" stroke="#00E5FF" stroke-width="0.5" opacity="0.2"/>
</svg>
